<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | PyGrassReal-Ai</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(900px circle at 10% -20%, rgba(125, 211, 252, 0.18), transparent 44%),
          linear-gradient(165deg, #070c10, #0d141a 38%, #121c24);
        color: #e8f1f7;
        font-family: "Space Grotesk", "Outfit", "Segoe UI", sans-serif;
      }

      main {
        width: min(560px, calc(100% - 32px));
        border: 1px solid rgba(125, 147, 164, 0.28);
        border-radius: 16px;
        background: rgba(16, 23, 30, 0.86);
        padding: 22px 18px;
        display: grid;
        gap: 10px;
      }

      h1 {
        margin: 0;
        font-size: 1.28rem;
      }

      p {
        margin: 0;
        color: #b6c8d4;
        line-height: 1.55;
      }

      button {
        width: fit-content;
        border: 1px solid rgba(125, 211, 252, 0.6);
        border-radius: 999px;
        background: linear-gradient(120deg, rgba(14, 116, 144, 0.82), rgba(30, 64, 175, 0.86));
        color: #eff6ff;
        font: inherit;
        font-size: 0.9rem;
        padding: 8px 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>PyGrassReal-Ai cannot reach the network right now. Reconnect and reload to continue.</p>
      <button type="button" onclick="window.location.reload()">Reload</button>
    </main>
  </body>
</html>
